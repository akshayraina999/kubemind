# This rule is not used by the project kubemind itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the v1alpha1.kubemind.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kubemind
    app.kubernetes.io/managed-by: kustomize
  name: triagewatcher-editor-role
rules:
- apiGroups:
  - v1alpha1.kubemind.io
  resources:
  - triagewatchers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - v1alpha1.kubemind.io
  resources:
  - triagewatchers/status
  verbs:
  - get
