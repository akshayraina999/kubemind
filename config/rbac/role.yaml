---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - v1alpha1.kubemind.io
  resources:
  - triagewatchers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - v1alpha1.kubemind.io
  resources:
  - triagewatchers/finalizers
  verbs:
  - update
- apiGroups:
  - v1alpha1.kubemind.io
  resources:
  - triagewatchers/status
  verbs:
  - get
  - patch
  - update
