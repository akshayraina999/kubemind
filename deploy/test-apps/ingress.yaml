apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubemind-test-ingress
  namespace: kubemind
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: missing-backend-service # 🚨 Pointing to a dead service to trigger network anomalies
            port:
              number: 8080