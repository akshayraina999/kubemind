apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubemind-operator.fullname" . }}
  labels:
    {{- include "kubemind-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubemind-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubemind-operator.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "kubemind-operator.fullname" . }}
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: OLLAMA_URL
              value: {{ .Values.ollama.url | quote }}
            - name: MODEL_NAME
              value: {{ .Values.ollama.model | quote }}
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi