apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kubemind-operator.fullname" . }}
  labels:
    {{- include "kubemind-operator.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubemind-operator.fullname" . }}-manager-role
rules:
  - apiGroups: ["v1alpha1.kubemind.io"]
    resources: ["triagewatchers", "triagewatchers/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets", "pods", "persistentvolumeclaims", "events", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubemind-operator.fullname" . }}-manager-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubemind-operator.fullname" . }}-manager-role
subjects:
  - kind: ServiceAccount
    name: {{ include "kubemind-operator.fullname" . }}
    namespace: {{ .Release.Namespace }}