apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-app
  namespace: kubemind
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-app
  template:
    metadata:
      labels:
        app: oom-app
    spec:
      containers:
      - name: oom-app
        image: polinux/stress
        command:
        - stress
        args:
        - "--vm"
        - "1"
        - "--vm-bytes"
        - "512M"
        - "--vm-hang"
        - "1"
        resources:
          limits:
            memory: "128Mi"